server {
    listen 8080;
    server_name ${FRAPPE_SITE_NAME_HEADER};
    root /home/frappe/frappe-bench/sites;

    include /etc/nginx/snippets/security_headers.conf;

    set_real_ip_from ${UPSTREAM_REAL_IP_ADDRESS};
    real_ip_header ${UPSTREAM_REAL_IP_HEADER};
    real_ip_recursive ${UPSTREAM_REAL_IP_RECURSIVE};

    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # -----------------------------
    # STATIC FILES
    # -----------------------------
    location /assets {
        try_files $uri =404;
    }

    # -----------------------------
    # SOCKETIO
    # -----------------------------
    location /socket.io {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        proxy_pass http://$SOCKETIO;
    }

    # -----------------------------
    # MAIN APP
    # -----------------------------
    location / {

        rewrite ^(.+)/$ $1 permanent;

        try_files /${FRAPPE_SITE_NAME_HEADER}/public/$uri @backend;
    }

    # -----------------------------
    # BACKEND (IMPORTANT FIX HERE)
    # -----------------------------
    location @backend {
        proxy_http_version 1.1;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Frappe-Site-Name ${FRAPPE_SITE_NAME_HEADER};
        proxy_set_header Host $host;

        proxy_read_timeout ${PROXY_READ_TIMEOUT};
        proxy_redirect off;

        # 🔥 CRITICAL FIX: NO upstream block
        proxy_pass http://$BACKEND;
    }

    # -----------------------------
    # PERFORMANCE
    # -----------------------------
    sendfile on;
    keepalive_timeout 15;

    client_max_body_size ${CLIENT_MAX_BODY_SIZE};
    client_body_buffer_size 16K;
    client_header_buffer_size 1k;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}