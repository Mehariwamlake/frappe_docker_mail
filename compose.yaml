version: "3.8"

name: techvision-frappe

x-customizable-image: &customizable_image
  image: ${CUSTOM_IMAGE:-ghcr.io/mehariwamlake/mail}:${CUSTOM_TAG:-faeabcf22df970a50cec415ce72e325cee4523bb}
  pull_policy: ${PULL_POLICY:-always}
  restart: ${RESTART_POLICY:-unless-stopped}


services:

  mariadb:
    image: mariadb:10.8
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-log-bin
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - mariadb-data:/var/lib/mysql

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-cache-data:/data

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

  

  # -------------------------
  # 🔥 AUTO SITE CREATION SERVICE
  # -------------------------
  create-site:
    <<: *backend_defaults
    platform: linux/amd64
    depends_on:
      mariadb:
        condition: service_started
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
 

    entrypoint: ["bash", "-c"]
    command: >
      set -e;

      echo "Waiting for MariaDB...";
      sleep 15;

      SITE=${SITE_NAME:-mail.techvision.edu.et};

      if [ ! -d sites/$SITE ]; then

        echo "Creating site...";
        mkdir -p sites;


        bench set-config -g redis_cache redis://redis-cache:6379;
        bench set-config -g redis_queue redis://redis-queue:6379;
        bench set-config -g redis_socketio redis://redis-queue:6379;
        bench set-config -g db_host mariadb;
        bench set-config -g db_port 3306;

        bench new-site $SITE \
          --admin-password ${ADMIN_PASSWORD:-admin} \
          --mariadb-root-password ${DB_ROOT_PASSWORD:-root} \
          --db-host mariadb;

        echo "Applying correct Redis config...";

        bench --site $SITE set-config redis_cache redis://redis-cache:6379;
        bench --site $SITE set-config redis_queue redis://redis-queue:6379;
        bench --site $SITE set-config redis_socketio redis://redis-queue:6379;

        bench --site $SITE install-app erpnext;
        bench --site $SITE install-app mail;

        echo "Site created successfully";

      else
        echo "Site already exists, skipping...";
      fi

  backend:
    <<: *backend_defaults
    platform: linux/amd64
    depends_on:
      create-site:
        condition: service_completed_successfully
      mariadb:
        condition: service_started
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started

  websocket:
    <<: *backend_defaults
    platform: linux/amd64
    depends_on:
 
      redis-queue:
        condition: service_started
      create-site:
        condition: service_completed_successfully
    environment:
      REDIS_URL: redis://redis-queue:6379
    command: >
      node /home/frappe/frappe-bench/apps/frappe/socketio.js

  frontend:
    <<: *customizable_image
    platform: linux/amd64
    command: ["nginx-entrypoint.sh"]
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER:-$host}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      - backend
      - websocket

  queue-short:
    <<: *backend_defaults
    command: bench worker --queue short,default

  queue-long:
    <<: *backend_defaults
    command: bench worker --queue long,default,short

  scheduler:
    <<: *backend_defaults
    command: bench schedule

volumes:
  sites:
    driver: local
  mariadb-data:
  redis-cache-data:
  redis-queue-data: